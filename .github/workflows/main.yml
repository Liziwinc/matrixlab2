name: Matrix CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build
        run: |
          cd src
          make

      - name: Upload build artifact
        uses: actions/upload-artifact@v5
        with:
          name: build-artifact
          path: .

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v5
        with:
          name: build-artifact

      - name: Run Tests
        run: |
          chmod +x cicd/test_script.sh
          ./cicd/test_script.sh

  package:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v5
        with:
          name: build-artifact

      - name: Package
        run: |
          chmod +x cicd/build_deb.sh
          ./cicd/build_deb.sh

      - name: Save Artifact
        uses: actions/upload-artifact@v5
        with:
          name: matrix-deb-package
          path: "*.deb"
          
  deploy:
    runs-on: ubuntu-latest
    needs: package 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download .deb artifact
        uses: actions/download-artifact@v5
        with:
          name: matrix-deb-package

      - name: List downloaded files (debug)
        run: ls -la *.deb

      - name: Build Docker image
        run: |
          docker build -t matrix-app:latest .

      - name: Run container and test
        run: |
          docker run --rm matrix-app:latest